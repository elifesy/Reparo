name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Pre-check & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ───────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node setup ─────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Pre-deploy checks (syntax + dependency audit) ──────
      - name: Run pre-deploy checks
        run: bash scripts/predeploy.sh

      # ── 5. Deploy to Fly.io ───────────────────────────────────
      - name: Deploy
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only --app reparo-app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ── 6. Post-deploy verification ───────────────────────────
      - name: Post-deploy verification
        run: bash scripts/postdeploy.sh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: reparo-app
